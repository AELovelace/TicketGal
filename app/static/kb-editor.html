<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knowledgebase Editor</title>
  <link rel="stylesheet" href="/theme.css">
  <link rel="stylesheet" href="/static/styles.css?v=20260407-2">
  <link rel="stylesheet" href="/static/codemirror.min.css">
</head>
<body class="kb-editor-standalone-body">
  <main class="kb-editor-standalone-shell card">
    <header class="kb-editor-standalone-header">
      <div>
        <p class="card-kicker">KNOWLEDGE MANAGEMENT</p>
        <h1 id="kb-window-title">New Article</h1>
      </div>
      <div class="actions" style="justify-content:flex-end;gap:0.5rem;">
        <button id="kb-window-close" type="button">Close</button>
      </div>
    </header>

    <div class="kb-editor-form">
      <label>
        Title
        <input id="kb-window-title-input" type="text" maxlength="200" required>
      </label>

      <label>
        Visibility
        <select id="kb-window-visibility">
          <option value="public">Public (visible to all users)</option>
          <option value="admin_only">Admin Only</option>
          <option value="company_assigned">Company Assigned</option>
          <option value="user_allowlist">User Allowlist</option>
        </select>
      </label>

      <label id="kb-window-customer-label" style="display:none;">
        Restrict to Property
        <select id="kb-window-customer-id">
          <option value="">-- Select a property --</option>
        </select>
      </label>

      <div class="kb-window-split">
        <section class="kb-window-pane">
          <label>
            Content (Markdown)
            <div id="kb-window-editor-host"></div>
          </label>
          <p id="kb-window-upload-hint" class="muted kb-editor-upload-hint">Markdown syntax highlighting is enabled. Drag a PNG, JPG, GIF, or WebP image into the editor to upload and insert markdown.</p>
        </section>
        <section class="kb-window-pane kb-window-preview-pane">
          <p class="card-kicker">LIVE PREVIEW</p>
          <div id="kb-window-preview" class="kb-window-preview"></div>
        </section>
      </div>

      <div class="kb-editor-actions">
        <button id="kb-window-rewrite-selection" type="button">Rewrite Selection with AI</button>
        <button id="kb-window-save" type="button">Save</button>
        <button id="kb-window-delete" type="button" class="btn-danger" style="display:none;">Delete</button>
        <span id="kb-window-status" class="muted"></span>
      </div>
    </div>
  </main>

  <script src="/static/codemirror.min.js"></script>
  <script src="/static/codemirror-markdown.min.js"></script>
  <script src="/static/marked.min.js"></script>
  <script src="/static/kb-editor-window.js" defer></script>
</body>
</html>
