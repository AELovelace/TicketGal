<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Rewrite Result</title>
  <link rel="stylesheet" href="/theme.css">
  <link rel="stylesheet" href="/static/styles.css?v=20260407-2">
</head>
<body class="kb-editor-standalone-body">
  <main class="kb-editor-standalone-shell card" style="height:auto;max-height:98vh;overflow:auto;">
    <header class="kb-editor-standalone-header">
      <div>
        <p class="card-kicker">AI REWRITE</p>
        <h1 style="margin:0;">Rewrite Result</h1>
      </div>
      <div class="actions" style="justify-content:flex-end;gap:0.5rem;">
        <button id="kb-rewrite-close" type="button">Close</button>
      </div>
    </header>

    <p class="muted">Review the rewritten section, then choose how to apply it in the editor.</p>

    <label>
      Rewritten Text
      <textarea id="kb-rewrite-result" rows="16" style="width:100%;font-family:'Courier New',monospace;font-size:0.92rem;"></textarea>
    </label>

    <div class="kb-editor-actions">
      <button id="kb-rewrite-insert" type="button">Insert at Cursor</button>
      <button id="kb-rewrite-replace" type="button">Replace Selection</button>
      <span id="kb-rewrite-status" class="muted"></span>
    </div>
  </main>

  <script src="/static/kb-rewrite-popup.js" defer></script>
</body>
</html>
