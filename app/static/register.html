<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TicketGal &mdash; Register</title>
  <link rel="stylesheet" href="/theme.css">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="brand-strip">
    <span id="brand-top-left">YOUR REGION</span>
    <span class="dot">|</span>
    <span id="brand-top-right">YOUR ORGANIZATION</span>
  </div>

  <main class="shell">
    <section class="auth-shell">
      <p id="brand-auth-eyebrow" class="eyebrow">SERVICE OPERATIONS</p>
      <h1 id="brand-auth-title">TicketGal Service Portal</h1>
      <p id="brand-register-description" class="muted">Create a new account. Admin approval is required before first login.</p>

      <div class="auth-single">
        <form id="register-form" class="card auth-card">
          <p class="card-kicker">ONBOARDING</p>
          <h2>Register User Account</h2>
          <label>
            Company Email
            <input id="register-email" type="email" required>
          </label>
          <label>
            Password
            <input id="register-password" type="password" minlength="8" required>
          </label>
          <button type="submit">Register</button>
          <p id="register-allowed-domains-note" class="muted">Allowed domains: configured by administrator</p>
          <p id="register-status" class="muted"></p>
          <p class="muted register-link">Already have an account? <a href="/">Sign in here</a></p>
        </form>
      </div>
    </section>
  </main>

  <script src="/static/register.js"></script>
</body>
</html>
