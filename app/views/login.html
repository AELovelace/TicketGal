<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TicketGal Login</title>
  <link rel="stylesheet" href="/theme.css">
  <link rel="stylesheet" href="/static/styles.css?v=dev">
</head>
<body>
  <div class="brand-strip">
    <span id="brand-top-left">YOUR REGION</span>
    <span class="dot">|</span>
    <span id="brand-top-right">YOUR ORGANIZATION</span>
  </div>

  <main class="shell">
    <section class="auth-shell">
      <p id="brand-auth-eyebrow" class="eyebrow">SERVICE OPERATIONS</p>
      <h1 id="brand-auth-title">TicketGal Service Portal</h1>
      <p id="brand-auth-description" class="muted">Log in to continue. New user registrations require admin approval.</p>

      <div class="auth-single">
        <form id="login-form" class="card auth-card">
          <p class="card-kicker">ACCESS</p>
          <h2>Sign In:</h2>

          <div id="microsoft-auth-block" class="auth-alt hidden">
            <button id="microsoft-login-btn" class="microsoft-login-btn" type="button">Sign in with Microsoft 365</button>
            <p class="muted auth-note">Uses your Microsoft 365 work account and can reuse your Edge sign-in session.</p>
          </div>

          <div id="local-login-block">
            <div id="local-login-divider" class="auth-divider"><span>or</span></div>
            <label>
              Company Email
              <input id="login-email" type="email" required>
            </label>
            <label>
              Password
              <input id="login-password" type="password" required>
            </label><br>
            <center><button id="local-login-btn" type="submit">Sign In</button></center>
          </div>

          <p id="login-status" class="muted"></p>
          <p id="register-link" class="muted register-link">Need an account? <a href="/register">Register here</a></p>
        </form>
      </div>
    </section>
  </main>

  <script src="/static/login.js?v=dev"></script>
</body>
</html>
